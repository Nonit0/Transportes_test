<div class="content-area">
  <div class="header-area">
    <h1>🏷️ Catálogo de Productos</h1>
    <div class="action-buttons">
      <button class="btn btn-outline" (click)="cancelarEdicion()" *ngIf="idEdicion">
        Limpiar Formulario
      </button>
    </div>
  </div>

  <div class="clr-row">
    <!-- FORMULARIO -->
    <div class="clr-col-lg-4 clr-col-12">
      <div class="card">
        <div class="card-header">
           {{ idEdicion ? '✏️ Editar Producto' : '➕ Nuevo Producto' }}
        </div>
        <div class="card-block">
          <form clrForm #prodForm="ngForm" (ngSubmit)="guardarProducto()">
            <clr-input-container>
              <label>Nombre</label>
              <input clrInput type="text" name="nombre" [(ngModel)]="formulario.nombre" required placeholder="Nombre del producto" />
              <clr-control-error>Requerido</clr-control-error>
            </clr-input-container>

            <clr-textarea-container>
              <label>Descripción</label>
              <textarea clrTextarea name="descripcion" [(ngModel)]="formulario.descripcion" placeholder="Opcional..."></textarea>
            </clr-textarea-container>

            <div class="clr-row">
              <div class="clr-col-6">
                <clr-input-container>
                  <label>Peso (kg)</label>
                  <input clrInput type="number" step="0.01" name="peso" [(ngModel)]="formulario.pesoUnitario" required min="0.01" />
                </clr-input-container>
              </div>
              <div class="clr-col-6">
                <clr-input-container>
                  <label>Volumen (m³)</label>
                  <input clrInput type="number" step="0.01" name="volumen" [(ngModel)]="formulario.volumenUnitario" required min="0.01" />
                </clr-input-container>
              </div>
            </div>

            <div class="card-footer" style="padding: 1rem 0 0 0">
              <button type="submit" class="btn btn-primary" [disabled]="prodForm.invalid">
                {{ idEdicion ? 'Actualizar' : 'Guardar' }}
              </button>
              <button type="button" class="btn btn-outline" (click)="cancelarEdicion()" *ngIf="idEdicion">
                Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- LISTADO -->
    <div class="clr-col-lg-8 clr-col-12">
      <clr-datagrid [clrDgLoading]="productos.length === 0 && !idEdicion">
        <clr-dg-column [clrDgField]="'nombre'">Producto</clr-dg-column>
        <clr-dg-column>Descripción</clr-dg-column>
        <clr-dg-column [clrDgField]="'pesoUnitario'">Peso</clr-dg-column>
        <clr-dg-column [clrDgField]="'volumenUnitario'">Volumen</clr-dg-column>

        <clr-dg-row *clrDgItems="let prod of productos" [clrDgItem]="prod">
          <clr-dg-action-overflow>
            <button class="action-item" (click)="activarEdicion(prod)">Editar</button>
            <button class="action-item" (click)="eliminarProducto(prod.id, prod.nombre)">Eliminar</button>
          </clr-dg-action-overflow>

          <clr-dg-cell>{{prod.nombre}}</clr-dg-cell>
          <clr-dg-cell>{{prod.descripcion}}</clr-dg-cell>
          <clr-dg-cell>{{prod.pesoUnitario}} kg</clr-dg-cell>
          <clr-dg-cell>{{prod.volumenUnitario}} m³</clr-dg-cell>
        </clr-dg-row>

        <clr-dg-footer>{{productos.length}} productos en catálogo</clr-dg-footer>
      </clr-datagrid>
    </div>
  </div>
</div>
