<div class="contenedor">
  <h1>🏷️ Catálogo de Productos</h1>

  <div class="tarjeta form-tarjeta">
    <h2>➕ Nuevo Producto</h2>
    <form #prodForm="ngForm" (ngSubmit)="guardarProducto()">
      <div
        class="grupo-inputs"
        style="display: flex; flex-wrap: wrap; gap: 10px"
      >
        <input
          type="text"
          placeholder="Nombre del producto"
          name="nombre"
          [(ngModel)]="formulario.nombre"
          required
          style="flex: 1; min-width: 200px"
        />
        <input
          type="text"
          placeholder="Descripción breve"
          name="descripcion"
          [(ngModel)]="formulario.descripcion"
          style="flex: 2; min-width: 200px"
        />
      </div>

      <div
        class="grupo-inputs"
        style="display: flex; gap: 10px; margin-top: 10px"
      >
        <input
          type="number"
          step="0.01"
          placeholder="Peso (kg)"
          name="peso"
          [(ngModel)]="formulario.pesoUnitario"
          required
          min="0.01"
        />
        <input
          type="number"
          step="0.01"
          placeholder="Volumen (m³)"
          name="volumen"
          [(ngModel)]="formulario.volumenUnitario"
          required
          min="0.01"
        />
      </div>

      <button
        type="submit"
        class="btn-crear"
        style="margin-top: 15px"
        [disabled]="prodForm.invalid"
        [class.btn-deshabilitado]="prodForm.invalid"
      >
        Registrar Producto
      </button>
    </form>
  </div>

  <hr />

  <div class="tarjeta" style="overflow-x: auto">
    <table style="width: 100%; border-collapse: collapse; text-align: left">
      <thead>
        <tr style="border-bottom: 2px solid #eee">
          <th style="padding: 10px">Nombre</th>
          <th style="padding: 10px">Descripción</th>
          <th style="padding: 10px">Peso (kg)</th>
          <th style="padding: 10px">Volumen (m³)</th>
          <th style="padding: 10px">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let prod of productos"
          style="border-bottom: 1px solid #eee"
        >
          <ng-container *ngIf="idEdicion !== prod.id">
            <td style="padding: 10px">
              <strong>{{ prod.nombre }}</strong>
            </td>
            <td style="padding: 10px">{{ prod.descripcion }}</td>
            <td style="padding: 10px">{{ prod.pesoUnitario }}</td>
            <td style="padding: 10px">{{ prod.volumenUnitario }}</td>
            <td style="padding: 10px; display: flex; gap: 5px">
              <button class="btn-editar" (click)="activarEdicion(prod)">
                ✏️
              </button>
              <button
                class="btn-eliminar"
                (click)="eliminarProducto(prod.id, prod.nombre)"
              >
                🗑️
              </button>
            </td>
          </ng-container>

          <ng-container *ngIf="idEdicion === prod.id">
            <td style="padding: 5px">
              <input
                type="text"
                [(ngModel)]="productoEnEdicion.nombre"
                style="width: 100%"
              />
            </td>
            <td style="padding: 5px">
              <input
                type="text"
                [(ngModel)]="productoEnEdicion.descripcion"
                style="width: 100%"
              />
            </td>
            <td style="padding: 5px">
              <input
                type="number"
                step="0.01"
                [(ngModel)]="productoEnEdicion.pesoUnitario"
                style="width: 80px"
              />
            </td>
            <td style="padding: 5px">
              <input
                type="number"
                step="0.01"
                [(ngModel)]="productoEnEdicion.volumenUnitario"
                style="width: 80px"
              />
            </td>
            <td style="padding: 5px; display: flex; gap: 5px">
              <button
                class="btn-crear"
                style="padding: 5px 10px"
                (click)="guardarEdicion(prod.id)"
              >
                💾
              </button>
              <button
                class="btn-cancelar"
                style="padding: 5px 10px"
                (click)="cancelarEdicion()"
              >
                ❌
              </button>
            </td>
          </ng-container>
        </tr>
      </tbody>
    </table>
  </div>
</div>
