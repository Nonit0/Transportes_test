<div class="contenedor">
  <h1>🏭 Gestión de Fábricas</h1>

  <div class="tarjeta form-tarjeta">
    <h2>{{ idEdicion ? "✏️ Editar Fábrica" : "➕ Nueva Fábrica" }}</h2>

    <form #fabricaForm="ngForm" (ngSubmit)="guardarFabrica()">
      <div style="display: flex; flex-wrap: wrap; gap: 10px">
        <div style="flex: 2; min-width: 200px">
          <input
            type="text"
            placeholder="Nombre de la Fábrica"
            name="nombre"
            [(ngModel)]="formulario.nombre"
            required
            style="width: 100%"
          />
        </div>
      </div>

      <div style="display: flex; gap: 10px; margin-top: 10px">
        <select
          name="direccionId"
          [(ngModel)]="formulario.direccionId"
          required
          style="padding: 10px; border-radius: 6px; border: 1px solid #ddd; flex: 1"
        >
          <option value="" disabled selected>-- Selecciona una Dirección --</option>
          <option *ngFor="let dir of direcciones" [value]="dir.id">
            {{ dir.textoMostrar }}
          </option>
        </select>

        <button
          type="button"
          class="btn-nueva-dir"
          (click)="abrirModal()"
          title="Crear nueva dirección"
        >
          ➕ Nueva
        </button>
      </div>

      <div class="botones-form" style="margin-top: 15px">
        <button
          type="submit"
          class="btn-crear"
          [disabled]="fabricaForm.invalid"
          [class.btn-deshabilitado]="fabricaForm.invalid"
        >
          {{ idEdicion ? "Actualizar Fábrica" : "Registrar Fábrica" }}
        </button>
        <button
          type="button"
          class="btn-cancelar"
          *ngIf="idEdicion"
          (click)="resetearFormulario()"
          style="margin-left: 10px"
        >
          Cancelar Edición
        </button>
      </div>
    </form>
  </div>

  <hr />

  <div *ngIf="fabricas.length === 0" class="cargando">
    <p>⏳ Cargando fábricas...</p>
  </div>

  <div class="lista-clientes">
    <div *ngFor="let fabrica of fabricas" class="tarjeta">
      <div class="tarjeta-header">
        <h2 style="margin: 0">{{ fabrica.nombre }}</h2>
        <div>
          <button class="btn-editar" (click)="cargarParaEdicion(fabrica)" title="Editar">✏️</button>
          <button class="btn-eliminar" (click)="eliminarFabrica(fabrica.id, fabrica.nombre)" title="Eliminar">🗑️</button>
        </div>
      </div>

      <p><strong>📍 Dirección:</strong> {{ fabrica.direccion?.calle }} - {{ fabrica.direccion?.ciudad }} ({{ fabrica.direccion?.cp }})</p>
      <small>ID Interno: {{ fabrica.id }}</small>
    </div>
  </div>

  <!-- ==========================================
       🛸 MODAL DE DIRECCIONES
       ========================================== -->
  <div class="modal-overlay" *ngIf="mostrarModal">
    <div class="modal-content">
      <h3 style="margin-top: 0">📍 Nueva Dirección</h3>

      <form #dirForm="ngForm" (ngSubmit)="guardarDireccion()">
        <div style="display: flex; flex-direction: column; gap: 10px">
          <input type="text" placeholder="Calle y número" name="calle"
            [(ngModel)]="nuevaDireccion.calle" required
            style="padding: 10px; width: 100%; box-sizing: border-box" />

          <div style="display: flex; gap: 10px">
            <input type="text" placeholder="Ciudad" name="ciudad"
              [(ngModel)]="nuevaDireccion.ciudad" required
              style="padding: 10px; flex: 1" />
            <input type="text" placeholder="CP" name="cp"
              [(ngModel)]="nuevaDireccion.cp" required pattern="^[0-9]+$"
              style="padding: 10px; width: 100px" />
          </div>

          <div style="display: flex; gap: 10px">
            <input type="text" placeholder="Provincia" name="provincia"
              [(ngModel)]="nuevaDireccion.provincia" required
              style="padding: 10px; flex: 1" />
            <input type="text" placeholder="País" name="pais"
              [(ngModel)]="nuevaDireccion.pais" required
              style="padding: 10px; flex: 1" />
          </div>
        </div>

        <div class="botones-form" style="margin-top: 20px">
          <button type="submit" class="btn-crear"
            [disabled]="dirForm.invalid" [class.btn-deshabilitado]="dirForm.invalid">
            Guardar Dirección
          </button>
          <button type="button" class="btn-cancelar" (click)="cerrarModal()">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
