<div class="contenedor">
  <h1>📦 Panel de Almacenes</h1>

  <div class="tarjeta form-tarjeta">
    <h2>{{ idEdicion ? "✏️ Editar Almacén" : "➕ Nuevo Almacén" }}</h2>

    <form #almacenForm="ngForm" (ngSubmit)="guardarAlmacen()">
      <div class="grupo-inputs">
        <input
          type="text"
          placeholder="Nombre (Ej: Hub Logístico Norte)"
          name="nombre"
          [(ngModel)]="formulario.nombre"
          required
        />

        <div style="display: flex; gap: 10px; flex: 1">
          <select
            name="direccionId"
            [(ngModel)]="formulario.direccionId"
            required
            style="
              padding: 10px;
              border-radius: 4px;
              border: 1px solid #ccc;
              flex: 1;
            "
          >
            <option value="" disabled selected>
              -- Selecciona una Dirección --
            </option>
            <option *ngFor="let dir of direcciones" [value]="dir.id">
              {{ dir.textoMostrar }}
            </option>
          </select>

          <button
            type="button"
            class="btn-nueva-dir"
            (click)="abrirModal()"
            title="Crear nueva dirección"
          >
            ➕ Nueva
          </button>
        </div>
      </div>

      <div class="botones-form" style="margin-top: 15px">
        <button
          type="submit"
          class="btn-crear"
          [disabled]="almacenForm.invalid"
          [class.btn-deshabilitado]="almacenForm.invalid"
        >
          {{ idEdicion ? "Actualizar Almacén" : "Guardar Almacén" }}
        </button>
        <button
          type="button"
          class="btn-cancelar"
          *ngIf="idEdicion"
          (click)="resetearFormulario()"
        >
          Cancelar Edición
        </button>
      </div>
    </form>
  </div>

  <hr />

  <div *ngIf="almacenes.length === 0" class="cargando">
    <p>⏳ Cargando almacenes...</p>
  </div>

  <div class="grid-almacenes">
    <div *ngFor="let almacen of almacenes" class="tarjeta">
      <div class="tarjeta-header">
        <h2 style="margin: 0">{{ almacen.nombre }}</h2>

        <div>
          <button
            class="btn-editar"
            (click)="cargarParaEdicion(almacen)"
            title="Editar Almacén"
          >
            ✏️
          </button>
          <button
            class="btn-eliminar"
            (click)="eliminarAlmacen(almacen.id, almacen.nombre)"
            title="Eliminar Almacén"
          >
            🗑️
          </button>
        </div>
      </div>

      <p><strong>📍 Dirección:</strong> {{ almacen.direccion?.calle }} - {{ almacen.direccion?.ciudad }} ({{ almacen.direccion?.cp }})</p>
      <small>ID Interno: {{ almacen.id }}</small>
    </div>
  </div>

  <div class="modal-overlay" *ngIf="mostrarModal">
    <div class="modal-content">
      <h3 style="margin-top: 0">📍 Nueva Dirección</h3>

      <form #dirForm="ngForm" (ngSubmit)="guardarDireccion()">
        <div style="display: flex; flex-direction: column; gap: 10px">
          <input
            type="text"
            placeholder="Calle y número (Ej: Calle Mayor 12)"
            name="calle"
            [(ngModel)]="nuevaDireccion.calle"
            required
            style="padding: 10px; width: 100%; box-sizing: border-box"
          />

          <div style="display: flex; gap: 10px">
            <input
              type="text"
              placeholder="Ciudad"
              name="ciudad"
              [(ngModel)]="nuevaDireccion.ciudad"
              required
              style="padding: 10px; flex: 1"
            />
            <input
              type="text"
              placeholder="CP"
              name="cp"
              [(ngModel)]="nuevaDireccion.cp"
              required
              pattern="^[0-9]+$"
              style="padding: 10px; width: 100px"
            />
          </div>

          <div style="display: flex; gap: 10px">
            <input
              type="text"
              placeholder="Provincia"
              name="provincia"
              [(ngModel)]="nuevaDireccion.provincia"
              required
              style="padding: 10px; flex: 1"
            />
            <input
              type="text"
              placeholder="País"
              name="pais"
              [(ngModel)]="nuevaDireccion.pais"
              required
              style="padding: 10px; flex: 1"
            />
          </div>
        </div>

        <div class="botones-form" style="margin-top: 20px">
          <button
            type="submit"
            class="btn-crear"
            [disabled]="dirForm.invalid"
            [class.btn-deshabilitado]="dirForm.invalid"
          >
            Guardar Dirección
          </button>
          <button type="button" class="btn-cancelar" (click)="cerrarModal()">
            Cancelar
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
